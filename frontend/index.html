<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘代码翻译系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 神秘代码翻译系统</h1>
            <p class="subtitle">斐波那契数列解密工具</p>
        </header>

        <main>
            <section class="input-section">
                <label for="codeInput">输入神秘代码（数字用空格分隔，0代表空格）：</label>
                <textarea 
                    id="codeInput" 
                    placeholder="例如：55 13 377 0 89 13..."
                    rows="4"
                ></textarea>
                <div class="button-group">
                    <button id="decryptBtn" class="btn-primary">解密</button>
                    <button id="clearBtn" class="btn-secondary">清空</button>
                    <button id="exampleBtn" class="btn-secondary">示例</button>
                </div>
            </section>

            <section class="result-section" id="resultSection" style="display: none;">
                <h2>解密结果</h2>
                <div class="result-box">
                    <div class="result-item">
                        <span class="label">原始代码：</span>
                        <span id="originalCode" class="value"></span>
                    </div>
                    <div class="result-item highlight">
                        <span class="label">解密结果：</span>
                        <span id="decryptedText" class="value result-text"></span>
                    </div>
                </div>
                <div id="errorSection" class="error-box" style="display: none;">
                    <h3>⚠️ 警告信息</h3>
                    <ul id="errorList"></ul>
                </div>
            </section>

            <section class="mapping-section">
                <h2>映射规则</h2>
                <p class="mapping-desc">斐波那契数列数字对应字母（A-Z），0 代表空格</p>
                <div id="mappingTable" class="mapping-grid">
                    <div class="mapping-loading">加载中...</div>
                </div>
            </section>
        </main>

        <footer>
            <p>基于斐波那契数列的加密解密系统 | 数字-字母索引由 Golang CLI 工具生成</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
